[loggers]

keys=root,app

[handlers]

keys=consoleHandler

[formatters]

keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_app]
level=DEBUG
handlers=consoleHandler
qualname=app
propagte = 0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatters=simpleFormatter
args=(sys.stdout, )

[formatter_simpleFormatter]
format=&(asctime)s - %(name)s -%(levelname)-8s -%(message)s